<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site.title }} {{ page.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-info">
      <div class="container">
        <a class="navbar-brand" href="{{ site.url }}">{{ site.title }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav">
            {% assign sorted_pages = site.pages | sort: "order" -%}
            {% for nav_page in sorted_pages -%}
            {% if nav_page.title != "Home" -%}
            <li class="nav-item">
              <a class="nav-link{% if nav_page.url == page.url %} active{% endif %}" {% if nav_page.url == page.url %}aria-current="page"{% endif %} href="{{ nav_page.url | relative_url }}">{{ nav_page.title }}</a>
            </li>
            {% endif -%}
            {% endfor -%}
          </ul>
        </div>
      </div>
    </nav>  
    <div class="container mt-4">
    {{ content }}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
